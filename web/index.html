<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>知识大脑</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #ffffff;
      --bg-alt:      #f9f9f9;
      --surface:     #ffffff;
      --surface-alt: #f5f5f4;
      --border:      #e8e8e3;
      --border-lt:   #f0f0eb;
      --text:        #2d2d2a;
      --text-2:      #6b6b65;
      --text-3:      #9b9b93;
      --accent:      #c96442;
      --accent-lt:   #fdf4f0;
      --green:       #2e7d5b;
      --green-lt:    #eef7f2;
      --yellow:      #a5800a;
      --yellow-lt:   #fdf9ec;
      --red:         #c4432b;
      --red-lt:      #fdf2f0;
      --sidebar-w:   260px;
      --radius:      16px;
      --radius-sm:   8px;
      --radius-xs:   6px;
      --shadow:      0 1px 3px rgba(0,0,0,.04);
      --shadow-md:   0 4px 16px rgba(0,0,0,.08);
    }

    body { font-family: 'Söhne', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; font-size:15px; color:var(--text); background:var(--bg); height:100vh; display:flex; overflow:hidden; }

    /* ── SIDEBAR (collapsible icon rail) ────────────────── */
    :root { --rail-w: 56px; }
    .sidebar {
      width:var(--rail-w); background:var(--bg-alt); border-right:1px solid var(--border-lt);
      display:flex; flex-direction:column; align-items:center; flex-shrink:0; height:100vh;
      transition:width .2s ease; overflow:hidden; z-index:80;
    }
    .sidebar.expanded { width:var(--sidebar-w); align-items:stretch; }

    .sidebar-header { padding:14px 0 10px; display:flex; flex-direction:column; align-items:center; gap:6px; width:100%; }
    .sidebar.expanded .sidebar-header { padding:16px 16px 12px; flex-direction:row; align-items:center; gap:10px; }
    .sidebar-brand { font-weight:700; font-size:17px; color:var(--text); letter-spacing:-.02em; display:none; }
    .sidebar.expanded .sidebar-brand { display:block; }
    .sidebar-toggle { width:36px; height:36px; border-radius:var(--radius-sm); border:none; background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-2); transition:.12s; flex-shrink:0; }
    .sidebar-toggle:hover { background:rgba(0,0,0,.06); color:var(--text); }
    .sidebar-toggle svg { width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
    .sidebar-health { display:flex; align-items:center; gap:5px; margin-left:auto; }
    .sidebar:not(.expanded) .sidebar-health { display:none; }
    .health-dot { width:7px; height:7px; border-radius:50%; background:var(--text-3); flex-shrink:0; }
    .health-dot.ok  { background:var(--green); }
    .health-dot.err { background:var(--red); }

    .sidebar-nav { padding:4px 0; display:flex; flex-direction:column; gap:2px; width:100%; align-items:center; }
    .sidebar.expanded .sidebar-nav { padding:4px 10px; align-items:stretch; }
    .nav-item {
      display:flex; align-items:center; justify-content:center; gap:10px; padding:9px 0; border-radius:var(--radius-sm);
      font-size:14px; color:var(--text-2); cursor:pointer; border:none; background:none; width:40px;
      text-align:left; transition:.12s; position:relative;
    }
    .sidebar.expanded .nav-item { width:100%; padding:9px 12px; justify-content:flex-start; }
    .nav-item:hover { background:rgba(0,0,0,.05); color:var(--text); }
    .nav-item .nav-icon { width:20px; height:20px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
    .nav-item .nav-icon svg { width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
    .nav-item .nav-label { display:none; white-space:nowrap; }
    .sidebar.expanded .nav-item .nav-label { display:inline; }
    .ico { display:inline-block; width:1em; height:1em; vertical-align:-0.125em; }
    .ico svg { width:100%; height:100%; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
    /* Tooltip for collapsed nav items */
    .nav-item[title]::after { content:attr(title); position:absolute; left:calc(100% + 8px); top:50%; transform:translateY(-50%); background:var(--text); color:#fff; font-size:12px; padding:4px 10px; border-radius:6px; white-space:nowrap; opacity:0; pointer-events:none; transition:opacity .15s; z-index:100; }
    .sidebar:not(.expanded) .nav-item:hover::after { opacity:1; }
    .sidebar.expanded .nav-item::after { display:none; }

    .sidebar-divider { height:1px; background:var(--border-lt); margin:8px 10px; width:calc(100% - 20px); }
    .sidebar.expanded .sidebar-divider { margin:8px 16px; width:auto; }

    .sidebar-section-label { font-size:12px; color:var(--text-3); padding:8px 0 4px; font-weight:500; display:none; }
    .sidebar.expanded .sidebar-section-label { display:block; padding:8px 22px 4px; }

    /* History list — only visible when expanded */
    .history-list { flex:1; overflow-y:auto; padding:0 10px 10px; display:none; width:100%; }
    .sidebar.expanded .history-list { display:block; }
    .history-item {
      padding:8px 12px; border-radius:var(--radius-sm); cursor:pointer; font-size:13px;
      color:var(--text-2); overflow:hidden;
      transition:.12s; margin-bottom:1px; position:relative;
    }
    .history-item:hover { background:rgba(0,0,0,.05); color:var(--text); }
    .history-item.active { background:rgba(0,0,0,.07); color:var(--text); font-weight:500; }
    .history-item .hi-title { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block; }
    .history-item .hi-time { font-size:11px; color:var(--text-3); margin-top:2px; }
    .history-item .hi-del { position:absolute; right:8px; top:8px; color:var(--text-3); cursor:pointer; font-size:12px; opacity:0; transition:.12s; padding:2px 4px; border-radius:4px; }
    .history-item:hover .hi-del { opacity:1; }
    .history-item .hi-del:hover { color:var(--red); background:var(--red-lt); }
    .history-group-label { font-size:11px; color:var(--text-3); padding:10px 12px 4px; font-weight:500; }

    /* History popover (shown when clicking history icon in collapsed mode) */
    .history-popover {
      position:fixed; left:calc(var(--rail-w) + 4px); top:0; width:300px; height:100vh;
      background:var(--bg); border:1px solid var(--border); border-radius:0 var(--radius) var(--radius) 0;
      box-shadow:var(--shadow-md); z-index:95; display:flex; flex-direction:column;
      transform:translateX(-8px); opacity:0; pointer-events:none; transition:transform .2s ease, opacity .2s ease;
    }
    .history-popover.open { transform:translateX(0); opacity:1; pointer-events:auto; }
    .history-popover-header { padding:16px 18px 12px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border-lt); flex-shrink:0; }
    .history-popover-header span { font-size:15px; font-weight:600; }
    .history-popover-body { flex:1; overflow-y:auto; padding:6px 10px 10px; }
    .history-popover-overlay { position:fixed; inset:0; z-index:94; display:none; }
    .history-popover-overlay.open { display:block; }

    .sidebar-footer { padding:12px 0; border-top:1px solid var(--border-lt); width:100%; display:flex; justify-content:center; }
    .sidebar.expanded .sidebar-footer { padding:12px 16px; justify-content:flex-start; }
    .sidebar-footer-inner { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-2); }
    .sidebar-avatar { width:28px; height:28px; border-radius:50%; background:var(--surface-alt); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; color:var(--text); }

    /* ── MAIN AREA ────────────────────────────────────────── */
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative; }

    /* ── WELCOME (centered input, no messages) ────────────── */
    .welcome {
      flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:40px 20px; gap:24px;
    }
    .welcome-title { font-size:32px; font-weight:600; color:var(--text); letter-spacing:-.03em; display:flex; align-items:center; gap:10px; }
    .welcome-icon { color:var(--accent); font-size:28px; }
    .welcome-input-wrap {
      width:100%; max-width:640px;
    }
    .welcome-input {
      width:100%; border:1px solid var(--border); border-radius:var(--radius); padding:16px 56px 16px 20px;
      font-size:15px; font-family:inherit; resize:none; outline:none; min-height:56px; max-height:200px;
      background:var(--surface); color:var(--text); line-height:1.5; box-shadow:var(--shadow);
      transition:.15s;
    }
    .welcome-input::placeholder { color:var(--text-3); }
    .welcome-input:focus { border-color:#c0bfba; box-shadow:0 0 0 1px rgba(0,0,0,.05), var(--shadow-md); }

    .welcome-input-box { position:relative; }
    .welcome-send {
      position:absolute; right:12px; bottom:12px; width:32px; height:32px; border-radius:50%;
      border:none; background:var(--text); color:#fff; cursor:pointer; display:flex;
      align-items:center; justify-content:center; font-size:16px; transition:.15s;
    }
    .welcome-send:hover { background:#000; }
    .welcome-send:disabled { background:var(--text-3); cursor:not-allowed; }

    .welcome-hint { font-size:12px; color:var(--text-3); text-align:center; }

    /* ── CHAT MODE ────────────────────────────────────────── */
    .chat-wrap { flex:1; display:flex; overflow:hidden; }
    .chat-main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
    .chat-thread {
      flex:1; overflow-y:auto; padding:24px 0;
    }
    .chat-inner { max-width:720px; width:100%; margin:0 auto; padding:0 24px; }

    /* ── PROCESS TIMELINE (right side of chat) ────────────── */
    .process-panel {
      width:240px; flex-shrink:0; border-left:1px solid var(--border-lt);
      overflow-y:auto; padding:16px 14px; background:var(--bg-alt);
    }
    .process-panel.empty { display:flex; align-items:center; justify-content:center; }
    .pp-title { font-size:11px; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:12px; }
    .pp-step { display:flex; gap:8px; position:relative; min-height:32px; }
    .pp-rail { display:flex; flex-direction:column; align-items:center; width:14px; flex-shrink:0; }
    .pp-dot { width:8px; height:8px; border-radius:50%; border:2px solid var(--border); background:var(--bg); flex-shrink:0; z-index:1; margin-top:2px; }
    .pp-dot.done { border-color:var(--green); background:var(--green); }
    .pp-dot.active { border-color:var(--accent); background:var(--accent); animation:pp-pulse 1.5s infinite; }
    .pp-dot.fail { border-color:var(--red); background:var(--red); }
    @keyframes pp-pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .pp-line { flex:1; width:2px; background:var(--border-lt); margin:2px 0; }
    .pp-line.done { background:var(--green); }
    .pp-body { flex:1; padding-bottom:8px; }
    .pp-label { font-size:12px; font-weight:500; color:var(--text); }
    .pp-label.wait { color:var(--text-3); }
    .pp-dur { font-size:10px; color:var(--text-3); font-family:'SF Mono',SFMono-Regular,Menlo,monospace; margin-top:1px; }
    .pp-detail { font-size:10px; color:var(--text-2); margin-top:1px; }
    .pp-step:last-child .pp-line { display:none; }
    .pp-empty { font-size:12px; color:var(--text-3); text-align:center; }

    .msg { margin-bottom:24px; }
    .msg-user { display:flex; justify-content:flex-end; }
    .msg-user .bubble {
      background:var(--surface-alt); color:var(--text); padding:12px 18px;
      border-radius:20px 20px 6px 20px; max-width:75%; line-height:1.6; white-space:pre-wrap;
      font-size:15px;
    }

    .msg-assistant { max-width:100%; }
    .ans-body { line-height:1.75; font-size:15px; color:var(--text); }
    .ans-body p { margin:0.5em 0; }
    .ans-body h1,.ans-body h2,.ans-body h3,.ans-body h4 { margin:0.8em 0 0.4em; font-size:1em; font-weight:600; }
    .ans-body h1 { font-size:1.2em; } .ans-body h2 { font-size:1.1em; }
    .ans-body ul,.ans-body ol { margin:0.4em 0; padding-left:1.5em; }
    .ans-body li { margin:0.2em 0; }
    .ans-body code { background:var(--bg-3); padding:1px 4px; border-radius:3px; font-size:0.9em; }
    .ans-body pre { background:var(--bg-3); padding:10px; border-radius:6px; overflow-x:auto; margin:0.5em 0; }
    .ans-body pre code { background:none; padding:0; }
    .ans-body blockquote { border-left:3px solid var(--border); padding-left:10px; margin:0.5em 0; color:var(--text-2); }
    .ans-body table { border-collapse:collapse; margin:0.5em 0; font-size:0.9em; }
    .ans-body th,.ans-body td { border:1px solid var(--border); padding:4px 8px; }
    .ans-body th { background:var(--bg-2); }
    .ans-body a[href^="evidence:"] { display:inline-block; font-size:0.8em; padding:0 6px; border-radius:4px; background:var(--surface-alt); border:1px solid var(--border); margin:0 1px; text-decoration:none; color:var(--text-2); cursor:pointer; vertical-align:2px; }
    .ans-body a[href^="evidence:"]:hover { border-color:var(--accent); color:var(--accent); }
    .ans-meta { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; align-items:center; padding-top:12px; border-top:1px solid var(--border-lt); }

    .badge { font-size:11px; padding:3px 9px; border-radius:20px; border:1px solid var(--border); background:var(--surface-alt); color:var(--text-2); font-weight:500; }
    .badge.confident { background:var(--green-lt); border-color:var(--green); color:var(--green); }
    .badge.partial   { background:var(--yellow-lt); border-color:var(--yellow); color:var(--yellow); }
    .badge.gap       { background:var(--red-lt); border-color:var(--red); color:var(--red); }
    .badge.short     { background:var(--surface-alt); }
    .badge.deep      { background:var(--accent-lt); border-color:var(--accent); color:var(--accent); }
    .badge.none, .badge.error { background:var(--red-lt); border-color:var(--red); color:var(--red); }

    .id-text { font-size:11px; color:var(--text-3); font-family:'SF Mono',SFMono-Regular,Menlo,monospace; cursor:pointer; }
    .id-text:hover { color:var(--accent); }
    .ans-citations { margin-top:12px; }
    .ans-citations h4 { font-size:11px; color:var(--text-3); margin-bottom:6px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; }
    .citation-tag { display:inline-block; font-size:11px; padding:2px 8px; border-radius:4px; background:var(--surface-alt); border:1px solid var(--border); margin:2px; cursor:pointer; font-family:'SF Mono',SFMono-Regular,Menlo,monospace; }
    .citation-tag:hover { border-color:var(--accent); color:var(--accent); }
    .kp-chip { display:inline-block; font-size:11px; padding:2px 8px; border-radius:4px; background:var(--surface-alt); border:1px solid var(--border); margin:2px 4px 2px 0; }
    .ans-feedback { margin-top:12px; display:flex; gap:8px; align-items:center; }
    .ans-feedback span { font-size:12px; color:var(--text-3); }
    .feedback-btn { background:none; border:1px solid var(--border); border-radius:var(--radius-xs); padding:4px 10px; cursor:pointer; font-size:12px; color:var(--text-2); transition:.12s; }
    .feedback-btn:hover { border-color:var(--text-2); color:var(--text); }
    .feedback-btn.selected { background:var(--accent-lt); border-color:var(--accent); color:var(--accent); }
    .feedback-btn:disabled { opacity:.4; cursor:not-allowed; }

    .msg-loading { display:flex; gap:8px; align-items:center; color:var(--text-3); font-size:14px; padding:12px 0; }
    .dots { display:inline-flex; gap:4px; }
    .dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:pulse 1.4s infinite; }
    .dot:nth-child(2) { animation-delay:.2s; }
    .dot:nth-child(3) { animation-delay:.4s; }
    @keyframes pulse { 0%,80%,100%{opacity:.15} 40%{opacity:.8} }

    /* ── BOTTOM INPUT (chat mode) ─────────────────────────── */
    .input-bar { padding:12px 24px 20px; background:var(--bg); }
    .input-bar-inner { max-width:720px; margin:0 auto; position:relative; }
    .input-bar textarea {
      width:100%; padding:14px 52px 14px 18px; border:1px solid var(--border); border-radius:var(--radius);
      font-size:15px; font-family:inherit; resize:none; outline:none; min-height:52px; max-height:180px;
      background:var(--surface); color:var(--text); line-height:1.5; box-shadow:var(--shadow); transition:.15s;
    }
    .input-bar textarea::placeholder { color:var(--text-3); }
    .input-bar textarea:focus { border-color:#c0bfba; box-shadow:0 0 0 1px rgba(0,0,0,.05), var(--shadow-md); }
    .input-bar .send-btn {
      position:absolute; right:10px; bottom:10px; width:32px; height:32px; border-radius:50%;
      border:none; background:var(--text); color:#fff; cursor:pointer; display:flex;
      align-items:center; justify-content:center; font-size:16px; transition:.15s;
    }
    .input-bar .send-btn:hover { background:#000; }
    .input-bar .send-btn:disabled { background:var(--text-3); cursor:not-allowed; }
    .input-hint { text-align:center; font-size:11px; color:var(--text-3); margin-top:6px; }

    /* ── EXPLAIN DRAWER (right) ──────────────────────────── */
    .explain-overlay { position:fixed; inset:0; background:rgba(0,0,0,.15); z-index:89; }
    .explain-drawer {
      position:fixed; top:0; right:-380px; width:360px; height:100vh;
      background:var(--bg); border-left:1px solid var(--border);
      z-index:90; display:flex; flex-direction:column;
      box-shadow:var(--shadow-md); transition:right .25s ease;
    }
    .explain-drawer.open { right:0; }

    .drawer-header { padding:16px 20px; border-bottom:1px solid var(--border-lt); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .drawer-header span { font-size:15px; font-weight:600; }

    .panel-tabs { display:flex; border-bottom:1px solid var(--border-lt); padding:0 12px; flex-shrink:0; }
    .panel-tab { padding:10px 14px; border:none; background:none; color:var(--text-3); font-size:13px; cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; transition:.12s; font-weight:500; }
    .panel-tab:hover { color:var(--text); }
    .panel-tab.active { color:var(--text); border-bottom-color:var(--accent); }
    .panel-content { flex:1; overflow-y:auto; padding:16px 20px; }
    .panel-empty { text-align:center; padding:40px 16px; color:var(--text-3); font-size:14px; }
    .panel-section { margin-bottom:18px; }
    .panel-section h3 { font-size:11px; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px; }
    .flow-step { display:flex; align-items:flex-start; gap:8px; padding:5px 0; font-size:13px; }
    .flow-arrow { color:var(--text-3); }
    .flow-label { color:var(--text-3); font-size:12px; min-width:60px; }
    .flow-val { color:var(--text); font-weight:500; flex:1; }

    .evidence-card { border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 14px; margin-bottom:8px; transition:.12s; }
    .evidence-card:hover { border-color:var(--text-3); }
    .evidence-card.direct { border-left:3px solid var(--green); }
    .evidence-card.supporting { border-left:3px solid var(--yellow); }
    .evidence-card .ev-role { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; }
    .evidence-card.direct .ev-role { color:var(--green); }
    .evidence-card.supporting .ev-role { color:var(--yellow); }
    .evidence-card .ev-source { font-size:11px; color:var(--text-3); margin-top:3px; }
    .evidence-card .ev-content { font-size:13px; margin-top:6px; line-height:1.5; color:var(--text-2); }
    .gap-item { padding:10px 12px; border-radius:var(--radius-sm); background:var(--red-lt); border:1px solid rgba(196,67,43,.15); margin-bottom:6px; font-size:13px; }

    /* ── FILE DRAWER ──────────────────────────────────────── */
    .file-overlay { position:fixed; inset:0; background:rgba(0,0,0,.2); z-index:100; }
    .file-drawer {
      position:fixed; top:0; right:-620px; width:600px; height:100vh; background:var(--bg);
      border-left:1px solid var(--border); z-index:101; display:flex; flex-direction:column;
      box-shadow:var(--shadow-md); transition:right .25s ease;
    }
    .file-drawer.open { right:0; }
    .file-drawer .drawer-header { padding:18px 24px; }
    .drawer-body { flex:1; overflow:hidden; display:flex; }
    .drawer-upload { width:260px; border-right:1px solid var(--border-lt); padding:16px; display:flex; flex-direction:column; gap:12px; }
    .drawer-sources { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .drawer-sources-header { padding:12px 16px; border-bottom:1px solid var(--border-lt); font-size:14px; font-weight:600; }
    .drawer-sources-list { flex:1; overflow-y:auto; padding:8px; }

    .upload-zone { border:2px dashed var(--border); border-radius:var(--radius); padding:28px 16px; text-align:center; cursor:pointer; transition:.15s; background:var(--bg-alt); }
    .upload-zone:hover, .upload-zone.drag-over { border-color:var(--accent); background:var(--accent-lt); }
    .upload-zone .uz-icon { font-size:28px; margin-bottom:8px; }
    .upload-zone .uz-text { font-size:13px; color:var(--text-2); }
    .upload-zone .uz-hint { font-size:11px; color:var(--text-3); margin-top:6px; }
    /* ── TIMELINE ─────────────────────────────────────────── */
    .timeline { padding:4px 0; }
    .timeline-title { font-size:12px; font-weight:600; color:var(--text-2); margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; }
    .timeline-title .tl-name { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
    .tl-step { display:flex; gap:10px; position:relative; min-height:36px; }
    .tl-rail { display:flex; flex-direction:column; align-items:center; width:16px; flex-shrink:0; }
    .tl-dot { width:10px; height:10px; border-radius:50%; border:2px solid var(--border); background:var(--bg); flex-shrink:0; z-index:1; }
    .tl-dot.done { border-color:var(--green); background:var(--green); }
    .tl-dot.active { border-color:var(--accent); background:var(--accent); animation:tl-pulse 1.5s infinite; }
    .tl-dot.fail { border-color:var(--red); background:var(--red); }
    @keyframes tl-pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .tl-line { flex:1; width:2px; background:var(--border); }
    .tl-line.done { background:var(--green); }
    .tl-body { flex:1; padding-bottom:10px; }
    .tl-label { font-size:12px; font-weight:500; color:var(--text); line-height:1; margin-top:-1px; }
    .tl-label.wait { color:var(--text-3); }
    .tl-time { font-size:10px; color:var(--text-3); margin-top:3px; font-family:'SF Mono',SFMono-Regular,Menlo,monospace; }
    .tl-step:last-child .tl-line { display:none; }
    .tl-empty { font-size:12px; color:var(--text-3); padding:12px 0; text-align:center; }

    .source-card { border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px; margin-bottom:6px; cursor:pointer; transition:.12s; }
    .source-card:hover { border-color:var(--text-3); background:var(--bg-alt); }
    .source-card.active { border-color:var(--accent); background:var(--accent-lt); }
    .source-card .sc-title { font-size:13px; font-weight:500; }
    .source-card .sc-meta { display:flex; gap:6px; margin-top:4px; align-items:center; flex-wrap:wrap; }
    .source-card .sc-actions { display:flex; gap:4px; margin-top:6px; }
    .status-chip { font-size:10px; padding:2px 7px; border-radius:10px; font-weight:500; }
    .status-pending    { background:#fef3c7; color:#92400e; }
    .status-processing { background:#dbeafe; color:#1e40af; }
    .status-completed  { background:var(--green-lt); color:var(--green); }
    .status-failed     { background:var(--red-lt); color:var(--red); }

    /* ── STUDY CARDS ─────────────────────────────────────── */
    .study-card { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin-bottom:16px; }
    .study-card h2 { font-size:16px; font-weight:700; margin-bottom:18px; }
    .study-summary-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
    .summary-stat { text-align:center; padding:16px 8px; border-radius:var(--radius-sm); background:var(--bg-alt); }
    .summary-stat .ss-val { font-size:28px; font-weight:700; }
    .summary-stat .ss-label { font-size:12px; color:var(--text-3); margin-top:4px; }
    .summary-stat.confident .ss-val { color:var(--green); }
    .summary-stat.partial   .ss-val { color:var(--yellow); }
    .summary-stat.gap       .ss-val { color:var(--red); }
    .table-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th { padding:10px 12px; text-align:left; font-size:11px; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:.05em; border-bottom:1px solid var(--border); }
    td { padding:10px 12px; border-bottom:1px solid var(--border-lt); }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:var(--bg-alt); }

    /* ── MODAL ────────────────────────────────────────────── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.3); z-index:200; display:flex; align-items:center; justify-content:center; }
    .modal-box { background:var(--bg); border-radius:var(--radius); padding:28px; width:500px; max-height:80vh; overflow-y:auto; box-shadow:var(--shadow-md); }
    .modal-box h2 { font-size:17px; font-weight:700; margin-bottom:18px; }
    .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:18px; }
    .detail-row { display:flex; gap:8px; padding:7px 0; border-bottom:1px solid var(--border-lt); font-size:13px; }
    .detail-row .dl { color:var(--text-3); min-width:80px; flex-shrink:0; font-weight:500; }
    .detail-row .dv { flex:1; word-break:break-all; }

    /* ── BUTTONS ──────────────────────────────────────────── */
    .btn { padding:6px 14px; border-radius:var(--radius-xs); border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:13px; cursor:pointer; transition:.12s; white-space:nowrap; font-weight:500; }
    .btn:hover { background:var(--bg-alt); border-color:var(--text-3); }
    .btn-primary { background:var(--text); color:#fff; border-color:var(--text); }
    .btn-primary:hover { background:#000; }
    .btn-sm { padding:4px 10px; font-size:12px; }
    .btn-ghost { border:none; background:transparent; color:var(--text-3); padding:6px 8px; }
    .btn-ghost:hover { background:rgba(0,0,0,.05); color:var(--text); }

    /* ── MISC ─────────────────────────────────────────────── */
    .hidden { display:none !important; }
    .copy-btn { font-size:10px; padding:2px 6px; border-radius:4px; border:1px solid var(--border); background:var(--bg-alt); cursor:pointer; color:var(--text-3); font-weight:500; }
    .copy-btn:hover { color:var(--accent); border-color:var(--accent); }
    .raw-json { font-family:'SF Mono',SFMono-Regular,Menlo,monospace; font-size:11px; white-space:pre-wrap; word-break:break-all; color:var(--text); background:var(--bg-alt); padding:14px; border-radius:var(--radius-sm); border:1px solid var(--border); overflow-x:auto; }
    select { padding:6px 10px; border:1px solid var(--border); border-radius:var(--radius-xs); font-size:13px; background:var(--bg); outline:none; cursor:pointer; color:var(--text); }
    select:focus { border-color:var(--text-3); }
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-thumb { background:#d9d9d4; border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:#b0b0a8; }
    .send-btn.stop-btn { background:var(--red); }
    .send-btn.stop-btn:hover { background:#c0392b; }
  </style>
  <script src="marked.min.js"></script>
</head>

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const S = {
  baseUrl:       window.location.origin + window.location.pathname.replace(/\/+$/, ''),
  currentTab:    'overview',
  currentAnswer: null,
  currentTrace:  null,
  pollTimers:    {},
  explainOpen:   false,
  chatMode:      false,
  sessionId:     null,
  sessions:      [],
};

// ═══════════════════════════════════════════════════════
// API CLIENT
// ═══════════════════════════════════════════════════════
async function api(method, path, body, isForm) {
  var url = S.baseUrl + path;
  var opts = { method: method };
  if (body && isForm) {
    opts.body = body;
  } else if (body) {
    opts.headers = { 'Content-Type': 'application/json' };
    opts.body = JSON.stringify(body);
  }
  var res = await fetch(url, opts);
  var text = await res.text();
  try { return { ok: res.ok, status: res.status, data: JSON.parse(text) }; }
  catch(e) { return { ok: res.ok, status: res.status, data: { raw: text } }; }
}

// ═══════════════════════════════════════════════════════
// VIEW SWITCHING (welcome ↔ chat)
// ═══════════════════════════════════════════════════════
function enterChatMode() {
  if (S.chatMode) return;
  S.chatMode = true;
  document.getElementById('welcomeView').classList.add('hidden');
  document.getElementById('chatView').classList.remove('hidden');
  document.getElementById('questionInput').focus();
}
function enterWelcomeMode() {
  S.chatMode = false;
  document.getElementById('chatView').classList.add('hidden');
  document.getElementById('welcomeView').classList.remove('hidden');
  document.getElementById('welcomeInput').focus();
}
function submitFromWelcome() {
  var input = document.getElementById('welcomeInput');
  var question = input.value.trim();
  if (!question) return;
  input.value = '';
  enterChatMode();
  doSubmit(question);
}

// ═══════════════════════════════════════════════════════
// EXPLAIN DRAWER
// ═══════════════════════════════════════════════════════
function openExplainDrawer() {
  S.explainOpen = true;
  document.getElementById('explainDrawer').classList.add('open');
  document.getElementById('explainOverlay').classList.remove('hidden');
}
function closeExplainDrawer() {
  S.explainOpen = false;
  document.getElementById('explainDrawer').classList.remove('open');
  document.getElementById('explainOverlay').classList.add('hidden');
}

// ═══════════════════════════════════════════════════════
// HEALTH CHECK
// ═══════════════════════════════════════════════════════
async function checkHealth() {
  try {
    var r = await api('GET', '/sources?limit=1');
    document.getElementById('healthDot').className = r.ok ? 'health-dot ok' : 'health-dot err';
  } catch {
    document.getElementById('healthDot').className = 'health-dot err';
  }
}

// ═══════════════════════════════════════════════════════
// QUESTION SUBMISSION
// ═══════════════════════════════════════════════════════
var _abortCtrl = null;

function showStopBtn() {
  var btn = document.getElementById('sendBtn');
  btn.textContent = '■';
  btn.classList.add('stop-btn');
  btn.disabled = false;
  btn.onclick = stopAnswer;
}

function showSendBtn() {
  var btn = document.getElementById('sendBtn');
  btn.textContent = '↑';
  btn.classList.remove('stop-btn');
  btn.disabled = false;
  btn.onclick = submitQuestion;
}

function stopAnswer() {
  if (_abortCtrl) { _abortCtrl.abort(); _abortCtrl = null; }
  showSendBtn();
}

async function submitQuestion() {
  var input = document.getElementById('questionInput');
  var question = input.value.trim();
  if (!question) return;
  input.value = '';
  autoResize(input);
  doSubmit(question);
}

async function doSubmit(question) {
  showStopBtn();

  // Ensure we have a session
  if (!S.sessionId) {
    var sr = await api('POST', '/sessions');
    if (sr.ok && sr.data) {
      S.sessionId = sr.data.session_id;
      await loadSessions();
    }
  }

  appendUserMsg(question);

  // Step 1: POST /session/turn
  var totalStart = Date.now();
  initProcessPanel(totalStart);
  updateProcessStep('session', 'active', '会话处理');

  var turnR = await api('POST', '/session/turn', { session_id: S.sessionId, user_input: question });
  if (!turnR.ok) {
    updateProcessStep('session', 'fail', '会话处理', Date.now() - totalStart);
    appendErrorMsg('会话处理失败：' + (turnR.data?.message || 'HTTP ' + turnR.status), null);
    showSendBtn();
    return;
  }
  updateProcessStep('session', 'done', '会话处理', Date.now() - totalStart);

  var turn = turnR.data;

  if (turn.action === 'interrupted') {
    document.getElementById('chatInner').innerHTML = '';
    appendSystemMsg('对话已重置');
    loadSessions();
    showSendBtn();
    document.getElementById('questionInput').focus();
    return;
  }

  if (turn.action === 'clarify' && turn.clarification) {
    showClarification(turn.clarification);
    loadSessions();
    showSendBtn();
    document.getElementById('questionInput').focus();
    return;
  }

  // Step 2: SSE stream via POST /answer/stream
  var eq = turn.expanded_query || {};
  var expandedQuestion = eq.expanded_question || question;
  var querySubject = eq.subject || '';
  var queryIntent = eq.intent || '';
  var queryAudience = eq.audience || '';
  var queryConstraint = eq.constraint || '';
  var loadingEl = appendLoading();
  var retrievalStart = Date.now();

  try {
    await doStreamAnswer(expandedQuestion, loadingEl, totalStart, retrievalStart, question, querySubject, queryIntent, queryAudience, queryConstraint);
  } catch (e) {
    if (e.name !== 'AbortError') {
      loadingEl.remove();
      updateProcessStep('activation', 'fail');
      appendErrorMsg('请求失败：' + e.message, null);
    }
  }

  _abortCtrl = null;
  showSendBtn();
  document.getElementById('questionInput').focus();
}

function doStreamAnswer(question, loadingEl, totalStart, retrievalStart, originalQuestion, subject, intent, audience, constraint) {
  return new Promise(function(resolve, reject) {
    var url = S.baseUrl + '/answer/stream';
    var body = JSON.stringify({ question: question, session_id: S.sessionId, subject: subject || '', intent: intent || '', audience: audience || '', constraint: constraint || '' });
    _abortCtrl = new AbortController();

    fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: body, signal: _abortCtrl.signal }).then(function(res) {
      if (!res.ok) {
        loadingEl.remove();
        res.text().then(function(t) {
          updateProcessStep('retrieval', 'fail', '知识检索');
          try { var d = JSON.parse(t); appendErrorMsg(d.message || 'HTTP ' + res.status, d); }
          catch(e2) { appendErrorMsg('HTTP ' + res.status, null); }
          resolve();
        });
        return;
      }

      var reader = res.body.getReader();
      var decoder = new TextDecoder();
      var buf = '';
      var contentBuf = '';
      var generationStart = 0;
      var answerResult = null;
      var streamEl = null;

      function processLine(line) {
        if (line.startsWith('event: ')) {
          S._sseEvent = line.slice(7).trim();
          return;
        }
        if (!line.startsWith('data: ')) return;
        var data = line.slice(6);
        var evt = S._sseEvent || '';

        if (evt === 'phase') {
          try {
            var p = JSON.parse(data);
            if (p.phase === 'activation' || p.phase === 'outline' || p.phase === 'fts' || p.phase === 'rerank') {
              var stepId = p.phase;
              if (p.status === 'start') {
                updateProcessStep(stepId, 'active', null, null, p.detail || '');
              } else if (p.status === 'done') {
                updateProcessStep(stepId, 'done', null, p.duration_ms, p.detail || '');
              } else if (p.status === 'error') {
                updateProcessStep(stepId, 'fail', null, p.duration_ms, p.detail || '');
              }
            } else if (p.phase === 'retrieval') {
              if (p.status === 'start') {
                updateProcessStep('activation', 'active');
              } else if (p.status === 'done') {
                updateProcessStep('generation', 'active', '生成回答');
                generationStart = Date.now();
              } else if (p.status === 'error') {
                updateProcessStep('activation', 'fail', null, p.duration_ms);
              }
            } else if (p.phase === 'answer' && p.status === 'no_evidence') {
              ['activation','outline','fts','rerank'].forEach(function(id) { updateProcessStep(id, 'done', null, 0, '无证据'); });
              updateProcessStep('generation', 'done', '生成回答', 0, '无需生成');
            } else if (p.phase === 'generation') {
              if (p.status === 'start') {
                var pathDetail = p.path === 'deep' ? '深度推理' : '简洁模式';
                updateProcessStep('generation', 'active', '生成回答', null, pathDetail);
                generationStart = Date.now();
              } else if (p.status === 'done') {
                updateProcessStep('generation', 'done', '生成回答', p.duration_ms);
                updateProcessStep('total', 'done', '总计', p.total_ms || (Date.now() - totalStart));
              } else if (p.status === 'error') {
                updateProcessStep('generation', 'fail', '生成回答', p.duration_ms);
              }
            }
          } catch(e) {}
        } else if (evt === 'content') {
          contentBuf += data;
          if (!streamEl) {
            loadingEl.remove();
            streamEl = document.createElement('div');
            streamEl.className = 'msg msg-assistant';
            streamEl.innerHTML = '<div class="ans-body stream-body"></div>';
            chatInner().appendChild(streamEl);
          }
          var bodyEl = streamEl.querySelector('.stream-body');
          if (bodyEl) {
            var streamText = extractStreamContent(contentBuf);
            bodyEl.innerHTML = renderMarkdown(streamText, buildFactIdNumbering(streamText, []));
            scrollThread();
          }
        } else if (evt === 'thinking') {
          updateProcessStep('generation', 'active', '回答生成', null, '思考中…');
        } else if (evt === 'result') {
          try { answerResult = JSON.parse(data); } catch(e) {}
        } else if (evt === 'done') {
          if (streamEl) { streamEl.remove(); streamEl = null; }
          else { loadingEl.remove(); }
          if (answerResult) {
            S.currentAnswer = answerResult;
            S.currentTrace = null;
            appendAnswerMsg(answerResult);
            fetchTraceForAnswer(answerResult.answer_id);
            renderRightPanel();
            updateProcessStep('trace', 'active', '追踪记录');
            setTimeout(function() { updateProcessStep('trace', 'done', '追踪记录'); }, 1500);
            api('POST', '/session/working', {
              session_id: S.sessionId,
              step_summary: '已回答：' + originalQuestion,
              continuable_action: ''
            });
            loadSessions();
          }
          resolve();
        } else if (evt === 'error') {
          loadingEl.remove();
          updateProcessStep('generation', 'fail', '回答生成');
          appendErrorMsg(data, null);
          resolve();
        }
      }

      function pump() {
        reader.read().then(function(result) {
          if (result.done) { resolve(); return; }
          buf += decoder.decode(result.value, { stream: true });
          var lines = buf.split('\n');
          buf = lines.pop();
          lines.forEach(processLine);
          pump();
        }).catch(function(err) { reject(err); });
      }
      pump();
    }).catch(reject);
  });
}

// PROCESS PANEL
// ═══════════════════════════════════════════════════════
var PP_STEPS = ['session','activation','outline','fts','rerank','generation','trace','total'];
var PP_STATE = {};

function initProcessPanel(startTime) {
  PP_STATE = {};
  PP_STEPS.forEach(function(id) { PP_STATE[id] = { state:'wait', label:'', dur:null, detail:'' }; });
  PP_STATE.session.label = '会话处理';
  PP_STATE.activation.label = '知识点激活';
  PP_STATE.outline.label = '目录结构检索';
  PP_STATE.fts.label = '全文检索';
  PP_STATE.rerank.label = '证据分类';
  PP_STATE.generation.label = '生成回答';
  PP_STATE.trace.label = '追踪记录';
  PP_STATE.total.label = '总计';
  PP_STATE._startTime = startTime;
  renderProcessPanel();
}

function updateProcessStep(id, state, label, durMs, detail) {
  if (!PP_STATE[id]) PP_STATE[id] = {};
  PP_STATE[id].state = state;
  if (label) PP_STATE[id].label = label;
  if (durMs !== undefined && durMs !== null) PP_STATE[id].dur = durMs;
  if (detail !== undefined) PP_STATE[id].detail = detail;
  renderProcessPanel();
}

function renderProcessPanel() {
  var panel = document.getElementById('processPanel');
  var html = '<div class="pp-title">处理过程</div>';
  PP_STEPS.forEach(function(id) {
    var s = PP_STATE[id];
    if (!s || !s.label) return;
    var isTotalRow = id === 'total';
    var dotCls = 'pp-dot' + (s.state !== 'wait' ? ' ' + s.state : '');
    var lineDone = (s.state === 'done' || s.state === 'active') ? ' done' : '';
    var labelCls = s.state === 'wait' ? ' wait' : '';
    var durText = '';
    if (s.dur !== null && s.dur !== undefined) {
      durText = s.dur >= 1000 ? (s.dur / 1000).toFixed(1) + 's' : s.dur + 'ms';
    }
    if (isTotalRow && s.state === 'done') {
      html += '<div style="border-top:1px solid var(--border-lt);margin:6px 0 8px;padding-top:8px;display:flex;justify-content:space-between;align-items:center">\
        <span style="font-size:12px;font-weight:600;color:var(--text-2)">' + esc(s.label) + '</span>\
        <span style="font-size:11px;font-weight:600;color:var(--green);font-family:\'SF Mono\',monospace">' + durText + '</span></div>';
      return;
    }
    if (isTotalRow) return;
    html += '<div class="pp-step">\
      <div class="pp-rail"><div class="' + dotCls + '"></div><div class="pp-line' + lineDone + '"></div></div>\
      <div class="pp-body"><div class="pp-label' + labelCls + '">' + esc(s.label) + '</div>' +
      (durText ? '<div class="pp-dur">' + durText + '</div>' : '') +
      (s.detail ? '<div class="pp-detail">' + esc(s.detail) + '</div>' : '') +
      '</div></div>';
  });
  panel.innerHTML = html;
}

async function selectClarification(ref) {

async function fetchTraceForAnswer(answerId) {
  try {
    var r = await api('GET', '/traces?answer_id=' + encodeURIComponent(answerId) + '&limit=1');
    if (r.ok && Array.isArray(r.data) && r.data.length > 0) {
      S.currentTrace = r.data[0];
      updateTraceInAnswerCard(answerId, r.data[0]);
      if (S.currentAnswer && S.currentAnswer.answer_id === answerId) {
        renderRightPanel();

    } else {
      setTimeout(function() { retryFetchTrace(answerId, 1); }, 2000);

function retryFetchTrace(answerId, attempt) {

}

var FACT_ID_RE = /[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}/g;

function buildFactIdNumbering(content, citations) {
  var map = {};
  var counter = 0;
  var re = new RegExp(FACT_ID_RE.source, 'g');
  var m;
  while ((m = re.exec(content || ''))) {
    if (!(m[0] in map)) { counter++; map[m[0]] = counter; }
  }
  (citations || []).forEach(function(fid) {
    if (!(fid in map)) { counter++; map[fid] = counter; }
  });
  return map;
}

function linkifyEvidence(content, map) {
  return (content || '').replace(FACT_ID_RE, function(fid) {
    var num = map[fid] || '?';
    return '[证据' + num + '](evidence:' + fid + ')';
  });
}

function renderMarkdown(text, factMap) {
  var src = factMap ? linkifyEvidence(text, factMap) : text;
  if (typeof marked !== 'undefined' && marked.parse) {
    try { return marked.parse(src); } catch(e) {}
  }
  return '<pre style="white-space:pre-wrap">' + esc(src) + '</pre>';
}

function extractStreamContent(raw) {
  var m = raw.match(/"content"\s*:\s*"((?:[^"\\]|\\.)*)"/);
  if (m) return m[1].replace(/\\n/g, '\n').replace(/\\"/g, '"').replace(/\\\\/g, '\\');
  var start = raw.indexOf('"content"');
  if (start === -1) return raw;
  var colonIdx = raw.indexOf(':', start + 9);
  if (colonIdx === -1) return raw;
  var quoteIdx = raw.indexOf('"', colonIdx + 1);
  if (quoteIdx === -1) return raw;
  var tail = raw.slice(quoteIdx + 1);
  return tail.replace(/\\n/g, '\n').replace(/\\"/g, '"').replace(/\\\\/g, '\\');
}

async function sendFeedback(traceId, answerId, type) {
  if (!traceId) return;
  try {
    var r = await api('POST', '/traces/' + traceId + '/feedback', { type: type });
    ['pos','neg'].forEach(function(t) {
      var el = document.getElementById('fb-' + t + '-' + answerId);
      if (el) el.classList.remove('selected');
    });
    document.getElementById('fb-' + (type === 'positive' ? 'pos' : 'neg') + '-' + answerId)?.classList.add('selected');
  } catch(e) { console.error('Feedback failed', e); }
}

function switchTab(tab) {
  S.currentTab = tab;
  document.querySelectorAll('.panel-tab').forEach(function(t) { t.classList.toggle('active', t.dataset.tab === tab); });
  renderRightPanel();
}

function renderRightPanel() {
  var ans = S.currentAnswer;
  var container = document.getElementById('panelContent');
  if (!ans) { container.innerHTML = '<div class="panel-empty">提交问题后查看解释与证据</div>'; return; }
  if (!S.explainOpen) openExplainDrawer();
  switch (S.currentTab) {
    case 'overview': renderOverviewTab(ans, container); break;
    case 'sources':  renderSourcesTab(ans, container);  break;
    case 'gaps':     renderGapsTab(ans, container);     break;
    default:         container.innerHTML = '<div class="panel-empty">未知标签页</div>';
  }
}

function renderOverviewTab(ans, container) {
  var evSet = ans.evidence_snapshot;
  var direct = evSet ? (evSet.direct_evidence || []) : [];
  var supporting = evSet ? (evSet.supporting || []) : [];

  var quality = trace ? trace.retrieval_quality : null;

  container.innerHTML = '\
    <div class="panel-section"><h3>回答依据</h3>\
      <div class="flow-step"><span class="flow-label">问题</span></div>\
      <div style="font-size:13px;padding:4px 0 10px 0;color:var(--text);line-height:1.5">' + esc(ans.question || '') + '</div>\
      <div class="flow-step"><span class="flow-arrow">↓</span><span class="flow-label">检索路径</span><span class="flow-val"><span class="badge ' + path + '">' + pathLabel(path) + '</span></span></div>\
      ' + (quality ? '<div class="flow-step"><span class="flow-arrow">↓</span><span class="flow-label">检索质量</span><span class="flow-val"><span class="badge ' + quality + '">' + qualityLabel(quality) + '</span></span></div>' : '') + '\
      <div class="flow-step"><span class="flow-arrow">↓</span><span class="flow-label">引用来源</span><span class="flow-val" style="font-size:12px">' + direct.length + ' 直接 · ' + supporting.length + ' 补充</span></div>\
    </div>\
    <div class="panel-section" style="border-top:1px solid var(--border-lt);padding-top:14px">\
      <h3>思考记录</h3>\
      ' + (tid
        ? '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><code style="font-size:10px;background:var(--bg-alt);padding:3px 8px;border-radius:4px;border:1px solid var(--border);flex:1;word-break:break-all">' + esc(tid) + '</code><button class="copy-btn" onclick="copy(\'' + esc(tid) + '\',this)">复制</button></div><button class="btn btn-sm" style="width:100%" onclick="showTraceDetail(\'' + esc(tid) + '\')">加载思考记录</button>'
        : '<div style="font-size:13px;color:var(--text-3);font-style:italic">记录生成中…</div>') + '\
    </div><div id="traceDetail"></div>';

function renderSourcesTab(ans, container) {
  var evSet = ans.evidence_snapshot;
  if (!evSet) { container.innerHTML = '<div class="panel-empty">本次回答未返回证据来源</div>'; return; }
  var direct = evSet.direct_evidence || [];
  var supporting = evSet.supporting || [];
  if (!direct.length && !supporting.length) { container.innerHTML = '<div class="panel-empty">本次回答未返回证据来源</div>'; return; }
  var html = '';
  if (direct.length) html += '<div class="panel-section"><h3>直接证据 (' + direct.length + ')</h3>' + direct.map(function(e) { return evidenceCardHtml(e, 'direct'); }).join('') + '</div>';

  container.innerHTML = html;

function evidenceCardHtml(e, role) {
  var fid = e.fact_id || '';
  var sourceId = '';
  try { var ref = typeof e.source_ref === 'string' ? JSON.parse(e.source_ref) : e.source_ref; if (ref) sourceId = ref.source_id || ''; } catch(ex) {}
  return '<div class="evidence-card ' + role + '" id="ev-' + esc(fid) + '">\
    <div class="ev-role">' + (role === 'direct' ? '直接证据' : '补充证据') + '</div>\
    ' + (sourceId ? '<div class="ev-source">来源: ' + esc(sourceId.slice(0,16)) + '…</div>' : '') + '\
    <div class="ev-content">' + esc((e.content||'').slice(0,200)) + ((e.content||'').length > 200 ? '…' : '') + '</div>\
    <div style="margin-top:8px;display:flex;gap:6px">\
      ' + (sourceId ? '<button class="btn btn-sm" onclick="event.stopPropagation();viewSource(\'' + esc(sourceId) + '\')">查看来源</button>' : '') + '\
      <button class="copy-btn" onclick="event.stopPropagation();copy(\'' + esc(fid) + '\',this)">复制 fact_id</button>\
    </div></div>';

function renderGapsTab(ans, container) {
  var trace = S.currentTrace;
  var quality = trace ? trace.retrieval_quality : null;
  var gapHtml;
  if (quality === 'gap') gapHtml = '<div class="gap-item">当前知识库中暂无与该问题相关的内容，已记录为知识缺口。</div>';
  else if (quality === 'partial') gapHtml = '<div class="gap-item" style="background:var(--yellow-lt);border-color:rgba(165,128,10,.15)">未找到直接证据，仅有补充性背景内容。</div>';
  else if (quality === 'confident') gapHtml = '<div style="font-size:13px;color:var(--text-3)">本次未发现明显知识缺口。</div>';
  else gapHtml = '<div style="font-size:13px;color:var(--text-3);font-style:italic">等待质量评估…</div>';
  container.innerHTML = '<div class="panel-section"><h3>本次缺口</h3>' + gapHtml + '</div>\
    <div class="panel-section" style="border-top:1px solid var(--border-lt);padding-top:14px"><h3>累计知识盲区</h3><div id="gapsList"><div style="font-size:12px;color:var(--text-3)">加载中...</div></div></div>';
  loadGaps();
}

async function loadGaps() {
  var el = document.getElementById('gapsList');
  if (!el) return;
  try {
    var r = await api('GET', '/study/gaps?limit=10');

// ── TIMELINE ──────────────────────────────────────────
var TL_STEPS = [
  { id:'upload',   label:'文件上传' },
  { id:'register', label:'来源登记' },
  { id:'convert',  label:'Markdown 转换' },
  { id:'units',    label:'知识单元构建' }
];

function showTimeline(title, phase, sourceData, uploadStart) {
  var panel = document.getElementById('timelinePanel');
  var now = new Date();
  var steps = TL_STEPS.map(function(s) {
    var state = 'wait', time = '';
    if (phase === 'uploading') {
      if (s.id === 'upload') { state = 'active'; time = fmtTime(uploadStart); }
    } else if (phase === 'upload_failed') {
      if (s.id === 'upload') { state = 'fail'; time = fmtTime(uploadStart); }
    } else if (phase === 'uploaded') {
      if (s.id === 'upload')   { state = 'done'; time = fmtTime(uploadStart); }
      if (s.id === 'register') { state = 'done'; time = fmtTime(now); }
    } else if (phase === 'processing') {
      if (s.id === 'upload')   { state = 'done'; time = fmtTime(uploadStart); }
      if (s.id === 'register') { state = 'done'; time = sourceData ? fmtTime(sourceData.created_at) : ''; }
      if (s.id === 'convert')  { state = 'active'; }
    } else if (phase === 'completed') {
      state = 'done';
      if (s.id === 'upload')   time = fmtTime(uploadStart);
      if (s.id === 'register') time = sourceData ? fmtTime(sourceData.created_at) : '';
      if (s.id === 'units')    time = fmtTime(now);
    } else if (phase === 'failed') {
      if (s.id === 'upload')   { state = 'done'; time = fmtTime(uploadStart); }
      if (s.id === 'register') { state = 'done'; time = sourceData ? fmtTime(sourceData.created_at) : ''; }
      if (s.id === 'convert')  { state = 'done'; }
      if (s.id === 'units')    { state = 'fail'; time = fmtTime(now); }
    }
    return { label: s.label, state: state, time: time };
  });
  panel.innerHTML = renderTimeline(title, steps, sourceData);
}

function showTimelineForSource(sourceId) {
  var panel = document.getElementById('timelinePanel');
  panel.innerHTML = '<div class="tl-empty">加载中...</div>';
  document.querySelectorAll('.source-card').forEach(function(c) { c.classList.remove('active'); });
  var card = document.getElementById('sc-' + sourceId);
  if (card) card.classList.add('active');

  api('GET', '/sources/' + sourceId).then(function(r) {
    if (!r.ok || !r.data) { panel.innerHTML = '<div class="tl-empty">加载失败</div>'; return; }
    var d = r.data;
    var steps = buildStepsFromSource(d);
    var errHtml = d.error_msg ? '<div style="margin-top:8px;font-size:11px;color:var(--red);padding:6px 8px;background:var(--red-lt);border-radius:var(--radius-xs)">' + esc(d.error_msg) + '</div>' : '';
    panel.innerHTML = renderTimeline(d.title || d.source_id, steps, d) + errHtml;

    if (d.status === 'processing' || d.status === 'pending') {
      clearTimeout(S.pollTimers['tl-' + sourceId]);
      S.pollTimers['tl-' + sourceId] = setTimeout(function() { showTimelineForSource(sourceId); }, 3000);
    }
  });
}

function buildStepsFromSource(d) {
  return TL_STEPS.map(function(s) {
    var state = 'wait', time = '';
    if (s.id === 'upload') {
      state = 'done';
      time = fmtTime(d.created_at);
    } else if (s.id === 'register') {
      state = 'done';
      time = fmtTime(d.created_at);
    } else if (s.id === 'convert') {
      if (d.status === 'pending') { state = 'wait'; }
      else if (d.status === 'processing') { state = 'active'; time = fmtTime(d.processing_started_at); }
      else { state = 'done'; time = fmtTime(d.processing_started_at); }
    } else if (s.id === 'units') {
      if (d.status === 'completed') { state = 'done'; time = fmtTime(d.completed_at); }
      else if (d.status === 'failed') { state = 'fail'; time = fmtTime(d.completed_at); }
      else if (d.status === 'processing') { state = 'wait'; }
      else { state = 'wait'; }
    }
    return { label: s.label, state: state, time: time };
  });
}

function renderTimeline(title, steps, sourceData) {
  var html = '<div class="timeline"><div class="timeline-title"><span class="tl-name">' + esc(title) + '</span>';
  if (sourceData && sourceData.source_id) html += '<button class="copy-btn" onclick="event.stopPropagation();copy(\'' + esc(sourceData.source_id) + '\',this)">ID</button>';
  html += '</div>';
  steps.forEach(function(s, i) {
    var dotCls = 'tl-dot' + (s.state !== 'wait' ? ' ' + s.state : '');
    var lineDone = (s.state === 'done' || s.state === 'active') ? ' done' : '';
    var labelCls = s.state === 'wait' ? ' wait' : '';
    html += '<div class="tl-step">\
      <div class="tl-rail"><div class="' + dotCls + '"></div><div class="tl-line' + lineDone + '"></div></div>\
      <div class="tl-body"><div class="tl-label' + labelCls + '">' + esc(s.label) + '</div>' +
      (s.time ? '<div class="tl-time">' + esc(s.time) + '</div>' : '') +
      '</div></div>';
  });
  html += '</div>';
  return html;
}

function fmtTime(t) {
  if (!t) return '';
  try {
    var d = t instanceof Date ? t : new Date(t);
    return d.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  } catch(e) { return ''; }
}

async function pollSourceTimeline(sourceId, title, uploadStart) {
  clearTimeout(S.pollTimers[sourceId]);
  try {
    var r = await api('GET', '/sources/' + sourceId);
    var status = (r.data && r.data.status) || 'unknown';
    if (status === 'completed') { showTimeline(title, 'completed', r.data, uploadStart); loadSources(); return; }
    if (status === 'failed') { showTimeline(title, 'failed', r.data, uploadStart); loadSources(); return; }
    showTimeline(title, 'processing', r.data, uploadStart);
  } catch(e) { /* ignore */ }
  S.pollTimers[sourceId] = setTimeout(function() { pollSourceTimeline(sourceId, title, uploadStart); }, 3000);
}

var sourcePage = 0;
var sourcePageSize = 10;
async function loadSources() {
  var filter = document.getElementById('sourceStatusFilter')?.value || '';
  var domainFilter = document.getElementById('sourceDomainFilter')?.value || '';
  var list = document.getElementById('sourcesList');
  if (!list) return;
  list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-3);font-size:12px">加载中...</div>';
  try {
    var params = 'limit=' + sourcePageSize + '&offset=' + (sourcePage * sourcePageSize);
    if (filter) params += '&status=' + filter;
    if (domainFilter) params += '&domain_id=' + domainFilter;
    var r = await api('GET', '/sources?' + params);
    var body = r.data || {};
    var src = Array.isArray(body.items) ? body.items : (Array.isArray(body) ? body : []);
    var total = body.total != null ? body.total : src.length;
    var totalPages = Math.ceil(total / sourcePageSize) || 1;
    var countEl = document.getElementById('sourcesCount');
    if (countEl) countEl.textContent = '(' + total + ')';
    // update domain filter options
    var domainSel = document.getElementById('sourceDomainFilter');
    if (domainSel && body.domains) {
      var curVal = domainSel.value;
      domainSel.innerHTML = '<option value="">全部领域</option>' + body.domains.map(function(d) {
        return '<option value="' + esc(d.domain_id) + '"' + (d.domain_id === curVal ? ' selected' : '') + '>' + esc(d.name) + '</option>';
      }).join('');
    }
    // update pager
    var pager = document.getElementById('sourcesPager');
    if (pager) {
      pager.style.display = totalPages > 1 ? 'flex' : 'none';
      document.getElementById('srcPageInfo').textContent = (sourcePage + 1) + ' / ' + totalPages;
      document.getElementById('srcPrevBtn').disabled = sourcePage <= 0;
      document.getElementById('srcNextBtn').disabled = sourcePage >= totalPages - 1;
    }
    if (!src.length) { list.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-3);font-size:13px">暂无来源</div>'; return; }
    list.innerHTML = src.map(function(s) {
      return '<div class="source-card" id="sc-' + esc(s.source_id) + '" onclick="showTimelineForSource(\'' + esc(s.source_id) + '\')"><div class="sc-title">' + esc(s.title || s.source_id) + '</div><div class="sc-meta">\
        <span class="status-chip status-' + (s.status || 'unknown') + '">' + statusLabel(s.status) + '</span>\
        <span class="badge">' + esc(s.format || '') + '</span>\
        ' + (s.domain_name ? '<span class="badge" style="background:var(--bg-3);color:var(--text-2)">' + esc(s.domain_name) + '</span>' : '') + '\
        <span style="font-size:10px;color:var(--text-3)">' + dateStr(s.created_at) + '</span>\
      </div><div class="sc-actions">\
        <button class="btn btn-sm" onclick="viewSource(\'' + esc(s.source_id) + '\')">详情</button>\
        ' + (s.status==='completed' ? '<button class="btn btn-sm" onclick="window.open(S.baseUrl+\'/sources/' + esc(s.source_id) + '/preview\',\'_blank\')">预览</button>' : '') + '\
        ' + (s.status==='failed' ? '<button class="btn btn-sm" onclick="event.stopPropagation();retrySource(\'' + esc(s.source_id) + '\')">重试</button>' : '') + '\
        ' + (s.status==='failed' ? '<button class="btn btn-sm" style="color:var(--red)" onclick="event.stopPropagation();deleteSource(\'' + esc(s.source_id) + '\')" title="删除"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>' : '') + '\
        <button class="copy-btn" onclick="event.stopPropagation();copy(\'' + esc(s.source_id) + '\',this)">复制ID</button>\
      </div></div>';
    }).join('');
  } catch(e) { list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--red);font-size:12px">加载失败</div>'; }
}

async function deleteSource(sourceId) {

      <div style="font-size:11px;color:var(--text-3);margin-top:12px">以上候选基于检索信号统计生成，仅供人工审核参考。</div></div>' : '') + '\
    ' + (wc.length ? '<div class="study-card"><h2>Wiki 候选 (' + wc.length + ')</h2><div class="table-wrap"><table>\
      <thead><tr><th>概念</th><th>达标 KP 数</th><th>平均置信</th><th>KPN 连接数</th><th>活跃天数</th><th>状态</th></tr></thead>\
      <tbody>' + wc.map(function(w) {

          ? points.map(function(p) {

              return '<span class="kp-chip" title="' + esc(p.point_summary || '') + '">' + esc(summary) + (summary.length >= 24 ? '…' : '') + ' (置信 ' + (p.confident_count||0) + ')</span>';
            }).join('')
          : (w.qualifying_point_ids || []).map(function(id) { return '<span class="kp-chip">' + esc(id) + '</span>'; }).join('');
        return '<tr><td><b>' + esc(w.concept_name||'') + '</b></td><td>' + (ws.qualifying_kp_count||0) + '</td><td>' + (ws.avg_confident_count ? ws.avg_confident_count.toFixed(1) : '-') + '</td><td>' + (ws.kpn_connection_count||0) + '</td><td>' + (ws.days_active||'-') + '</td><td><span class="badge ' + (w.recommendation==='ready'?'confident':'partial') + '">' + (w.recommendation==='ready' ? '可编译' : '数据不足') + '</span></td></tr>'
          + '<tr><td colspan="6" style="padding-top:0;border-top:none"><div style="font-size:11px;color:var(--text-3);margin-bottom:4px">关联知识点</div>' + pointsHtml + '</td></tr>';
      }).join('') + '</tbody></table></div></div>' : '') + '\
    ' + (gp.length ? '<div class="study-card"><h2>高频知识盲区 (' + gp.length + ')</h2><div class="table-wrap"><table>\
      <thead><tr><th>问题主题</th><th>出现次数</th><th>典型问题</th></tr></thead>\
      <tbody>' + gp.map(function(g) { return '<tr><td><code style="font-size:12px">' + esc(g.question_terms||'') + '</code></td><td><span class="badge gap">' + (g.hit_count||0) + ' 次</span></td><td style="font-size:12px;color:var(--text-2)">' + esc((g.question||'').slice(0,60)) + '</td></tr>'; }).join('') + '</tbody></table></div></div>' : '') + '\
    <div class="study-card"><h2>历史报告</h2><div id="reportsList"><button class="btn btn-sm" onclick="loadReportList()">加载历史报告</button></div></div>';
}

async function loadReportList() {
  var el = document.getElementById('reportsList');
  el.innerHTML = '加载中...';
  try {
    var r = await api('GET', '/study/reports');
    var list = Array.isArray(r.data) ? r.data : [];
    if (!list.length) { el.innerHTML = '<span style="font-size:13px;color:var(--text-3)">暂无历史报告</span>'; return; }
    el.innerHTML = list.map(function(rp) {
      return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-lt)"><span style="font-size:13px">' + dateStr(rp.created_at) + '</span><span class="badge">周期 ' + (rp.period_days||30) + ' 天</span><span style="font-size:11px;color:var(--text-3)">候选 ' + (rp.candidates_count||0) + ' · Wiki ' + (rp.wiki_count||0) + ' · 缺口 ' + (rp.gap_count||0) + '</span></div>';
    }).join('');
  } catch(e) { el.innerHTML = '<span style="color:var(--red);font-size:12px">加载失败</span>'; }
}

async function runStudy() {
  var btn = document.getElementById('runStudyBtn');
  var body = document.getElementById('studyBody');
  btn.disabled = true; btn.textContent = '生成中...';
  body.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-3)">正在生成学习报告...</div>';
  try {
    var r = await api('POST', '/study/run', {});
    if (r.ok) { loadStudyReport(); }
    else { body.innerHTML = '<div style="color:var(--red);padding:20px">生成失败：' + esc(JSON.stringify(r.data)) + '</div>'; }
  } catch(e) { body.innerHTML = '<div style="color:var(--red);padding:20px">请求失败：' + esc(e.message) + '</div>'; }
  btn.disabled = false; btn.textContent = '生成报告';
}

// ═══════════════════════════════════════════════════════
// SIDEBAR TOGGLE
// ═══════════════════════════════════════════════════════
function toggleSidebar() {
  var sb = document.getElementById('sidebar');
  sb.classList.toggle('expanded');
  if (sb.classList.contains('expanded')) {
    closeHistoryPopover();
  }
}

function toggleHistoryPopover() {
  var sb = document.getElementById('sidebar');
  if (sb.classList.contains('expanded')) {
    return; // history is already visible inline
  }
  var pop = document.getElementById('historyPopover');
  var overlay = document.getElementById('historyPopoverOverlay');
  var isOpen = pop.classList.contains('open');
  if (isOpen) {
    closeHistoryPopover();
  } else {
    renderSessionList();
    pop.classList.add('open');
    overlay.classList.add('open');
  }
}

function closeHistoryPopover() {
  document.getElementById('historyPopover').classList.remove('open');
  document.getElementById('historyPopoverOverlay').classList.remove('open');
}

// ═══════════════════════════════════════════════════════
// SESSION HISTORY
// ═══════════════════════════════════════════════════════
async function loadSessions() {
  try {
    var r = await api('GET', '/sessions');
    if (r.ok && r.data && r.data.sessions) {
      S.sessions = r.data.sessions;
      renderSessionList();
    }
  } catch(e) { console.error('Failed to load sessions', e); }
}

function relativeTime(dateStr) {
  if (!dateStr) return '';
  try {
    var d = new Date(dateStr);
    var now = new Date();
    var diffMs = now - d;
    var diffMin = Math.floor(diffMs / 60000);
    if (diffMin < 1) return '刚才';
    if (diffMin < 60) return diffMin + ' 分钟前';
    var diffHr = Math.floor(diffMin / 60);
    if (diffHr < 24) return diffHr + ' 小时前';
    var diffDay = Math.floor(diffHr / 24);
    if (diffDay === 1) return '昨天';
    if (diffDay < 7) return diffDay + ' 天前';
    return d.toLocaleDateString('zh-CN', { month:'numeric', day:'numeric' });
  } catch(e) { return ''; }
}

function dateGroupLabel(dateStr) {
  if (!dateStr) return '未知';
  try {
    var d = new Date(dateStr);
    var now = new Date();
    var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    var yesterday = new Date(today - 86400000);
    var itemDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    if (itemDay >= today) return '今天';
    if (itemDay >= yesterday) return '昨天';
    var diffDay = Math.floor((today - itemDay) / 86400000);
    if (diffDay < 7) return '本周';
    return '更早';
  } catch(e) { return '未知'; }
}

function buildSessionListHtml() {
  if (!S.sessions.length) {
    return '<div style="padding:16px 22px;color:var(--text-3);font-size:12px">暂无记录</div>';
  }
  var html = '';
  var lastGroup = '';
  S.sessions.forEach(function(sess) {
    var group = dateGroupLabel(sess.updated_at);
    if (group !== lastGroup) {
      html += '<div class="history-group-label">' + esc(group) + '</div>';
      lastGroup = group;
    }
    var active = (S.sessionId === sess.session_id) ? ' active' : '';
    var title = sess.title || '新对话';
    var time = relativeTime(sess.updated_at);
    html += '<div class="history-item' + active + '" onclick="switchSession(\'' + esc(sess.session_id) + '\')" title="' + esc(title) + '">';
    html += '<span class="hi-title">' + esc(title) + '</span>';
    html += '<span class="hi-time">' + esc(time) + '</span>';
    html += '<span class="hi-del" onclick="event.stopPropagation();deleteSession(\'' + esc(sess.session_id) + '\')" title="删除">✕</span>';
    html += '</div>';
  });
  return html;
}

function renderSessionList() {
  var html = buildSessionListHtml();
  document.getElementById('historyList').innerHTML = html;
  document.getElementById('historyPopoverBody').innerHTML = html;
}

async function switchSession(sessionId) {
  S.sessionId = sessionId;
  S.currentAnswer = null;
  S.currentTrace = null;
  closeHistoryPopover();
  renderSessionList();
  enterChatMode();
  document.getElementById('chatInner').innerHTML = '';

  try {
    var tr = await api('GET', '/sessions/' + sessionId + '/turns');
    if (tr.ok && tr.data && tr.data.turns) {
      for (var i = 0; i < tr.data.turns.length; i++) {
        var t = tr.data.turns[i];
        appendUserMsg(t.user_input);
        if (t.action === 'interrupted') {
          appendSystemMsg('对话已重置');
        } else if (t.action === 'clarify' && t.clarify_msg) {
          appendClarifyRecord(t.clarify_msg);
        } else if (t.action === 'retrieve') {
          if (t.answer_id) {
            var ar = await api('GET', '/answers/' + t.answer_id);
            if (ar.ok && ar.data) {
              S.currentAnswer = ar.data;
              appendAnswerMsg(ar.data);
              fetchTraceForAnswer(ar.data.answer_id);
            }
          } else {
            appendSystemMsg('（回答记录未关联）');
          }
        }
      }
    }
    renderRightPanel();
  } catch(e) { console.error('Failed to load session', e); }
}

function appendClarifyRecord(msg) {
  var el = div('msg msg-system');
  el.innerHTML = '<div class="msg-bubble" style="background:var(--bg-alt);border:1px solid var(--border);padding:12px;font-size:13px;color:var(--text-2)">' + esc(msg) + '</div>';
  chatInner().appendChild(el);
  scrollThread();
}

async function deleteSession(sessionId) {
  await api('DELETE', '/sessions/' + sessionId);
  if (S.sessionId === sessionId) {
    S.sessionId = null;
    S.currentAnswer = null;
    S.currentTrace = null;
    await loadSessions();
    if (S.sessions.length > 0) {
      switchSession(S.sessions[0].session_id);
    } else {
      newConversation();
    }
  } else {
    loadSessions();
  }
}

async function newConversation() {
  var sr = await api('POST', '/sessions');
  if (sr.ok && sr.data) {
    S.sessionId = sr.data.session_id;
  } else {
    S.sessionId = null;
  }
  S.currentAnswer = null;
  S.currentTrace = null;
  closeHistoryPopover();
  if (S.explainOpen) closeExplainDrawer();
  document.getElementById('chatInner').innerHTML = '';
  document.getElementById('panelContent').innerHTML = '<div class="panel-empty">提交问题后查看解释与证据</div>';
  var pp = document.getElementById('processPanel');
  if (pp) pp.innerHTML = '<div class="pp-empty">提问后查看处理过程</div>';
  enterWelcomeMode();
  loadSessions();
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function chatInner()    { return document.getElementById('chatInner'); }
function scrollThread() { var t = document.getElementById('chatThread'); t.scrollTop = t.scrollHeight; }
function div(cls)       { var el = document.createElement('div'); el.className = cls; return el; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function dateStr(s) { if (!s) return ''; try { return new Date(s).toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}); } catch(e) { return s||''; } }
function qualityLabel(q) { return {confident:'置信',partial:'部分',gap:'缺口'}[q] || q || '未知'; }
function pathLabel(p) { return {short:'简洁模式',deep:'深度推理',none:'无法回答',error:'出错'}[p] || p || '未知'; }
function statusLabel(s) { return {pending:'等待中',processing:'处理中',completed:'已完成',failed:'失败'}[s] || s || '未知'; }
function recLabel(r) { return {strong:'强推荐',candidate:'候选',ready:'可编译',needs_more_data:'数据不足'}[r] || r || '-'; }

async function copy(text, el) {
  if (!text) return;
  try { await navigator.clipboard.writeText(text); var orig = el.textContent; el.textContent = '已复制'; setTimeout(function() { el.textContent = orig; }, 1200); }
  catch(e) { console.warn('Copy failed'); }
}

function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 200) + 'px'; }

function inputKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (S.chatMode) submitQuestion();
    else submitFromWelcome();
  }
}

document.getElementById('chatInner').addEventListener('click', function(e) {
  var a = e.target.closest('a[href^="evidence:"]');
  if (!a) return;
  e.preventDefault();
  openEvidenceInDrawer(a.getAttribute('href').slice('evidence:'.length));
});

  if (S.sessions.length > 0) {
    S.sessionId = S.sessions[0].session_id;
